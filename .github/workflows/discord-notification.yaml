name: Send Discord Notifications

run-name: Send Discord Notification -- ${{ github.actor }} -- ${{ github.ref_name }}

on:
  push:

jobs:
  notify-discord:
    runs-on: ubuntu-24.04

    steps:
      - name: Build payload.json safely
        env:
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          jq -n \
            --arg username "Jackie Chan Adventures" \
            --arg avatar_url "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQpzfU0NzT1vxB1ZssjpQfaNu0Z6mtbmlejPg&s" \
            --arg actor "$ACTOR" \
            --arg branch "$BRANCH" \
            --arg repository "$REPOSITORY" \
            --arg sha "$SHA" \
            --arg commit_message "$COMMIT_MESSAGE" \
            '{
              username: $username,
              avatar_url: $avatar_url,
              content: "New push detected",
              embeds: [
                {
                  title: ("New push by " + $actor),
                  description: ("A push was made to **" + $repository + "**."),
                  color: 15258703,
                  fields: [
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Commit",
                      value: $sha,
                      inline: true
                    },
                    {
                      name: "Commit Message",
                      value: $commit_message,
                      inline: false
                    }
                  ]
                }
              ]
            }' > payload.json

      - name: Validate JSON
        run: |
          cat payload.json
          jq . payload.json

      - name: Send webhook
        env:
          WEBHOOK_URL: ${{ secrets.BASED_BLOG_BACKEND_DISCORD_HOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               --data-binary @payload.json \
               "$WEBHOOK_URL"